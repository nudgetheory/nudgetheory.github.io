  <script>
    function toggleMenu() {
      document.getElementById('mobileNav').classList.toggle('open');
    }

    const galleryImages = [
      'images/moloko-feb-2026/gallery-1.jpeg',
      'images/moloko-feb-2026/gallery-2.jpeg',
      'images/moloko-feb-2026/gallery-3.jpeg',
      'images/moloko-feb-2026/gallery-4.jpeg',
      'images/moloko-feb-2026/gallery-5.jpeg',
      'images/moloko-feb-2026/gallery-6.jpeg',
      'images/moloko-feb-2026/gallery-7.jpeg',
      'images/moloko-feb-2026/gallery-8.jpeg',
      'images/moloko-feb-2026/gallery-9.jpeg',
      'images/cherry-tree-jan-2025/gallery-1.jpeg',
      'images/cherry-tree-jan-2025/gallery-2.jpeg',
      'images/cherry-tree-jan-2025/gallery-3.jpeg',
      'images/cherry-tree-jan-2025/gallery-4.jpeg',
      'images/cherry-tree-jan-2025/gallery-5.jpeg',
      'images/cherry-tree-jan-2025/gallery-6.jpeg',
      'images/cherry-tree-jan-2025/gallery-7.jpg'
    ];
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      const lightbox = document.getElementById('lightbox');
      const img = document.getElementById('lightboxImg');
      img.src = galleryImages[index];
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigateLightbox(direction) {
      currentIndex = (currentIndex + direction + galleryImages.length) % galleryImages.length;
      document.getElementById('lightboxImg').src = galleryImages[currentIndex];
    }

    // Close on backdrop click
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      const lightbox = document.getElementById('lightbox');
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
    });
  </script>
